services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-yts}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-yts}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-yts}
    networks:
      - default
      - caddy
    labels:
      caddy: "*.acbc.house"
      caddy.@youtube-rss.host: "youtube-rss.acbc.house"
      caddy.reverse_proxy: "@youtube-rss {{upstreams http 8000}}"

networks:
  caddy:
    external: true

volumes:
  db-data:
