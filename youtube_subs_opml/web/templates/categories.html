{% extends "base.html" %}

{% block title %}Categories — YouTube Subs OPML{% endblock %}

{% block content %}
<h1>Categories</h1>

<form hx-post="/categories" hx-target="#category-list" hx-swap="innerHTML">

</form>

<div id="category-list">
  {% include "partials/category_list.html" %}
</div>
{% endblock %}
