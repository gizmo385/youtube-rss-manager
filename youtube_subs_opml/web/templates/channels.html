{% extends "base.html" %}

{% block title %}Channels — YouTube Subs OPML{% endblock %}

{% block content %}
<div class="tabs" role="tablist">
  <button class="tab{% if active_tab == 'channels' %} active{% endif %}" role="tab" onclick="switchTab('channels')">
    Channels ({{ total }})
  </button>
  <button class="tab{% if active_tab == 'categories' %} active{% endif %}" role="tab" onclick="switchTab('categories')">
    Categories ({{ categories_with_counts|length }})
  </button>
</div>

<div id="tab-channels" class="tab-panel{% if active_tab != 'channels' %} hidden{% endif %}" role="tabpanel">
  <form id="channel-form">
    <div class="toolbar sticky-toolbar">
      <input type="search" id="channel-search" placeholder="Search channels..." oninput="filterChannels(this.value)">
    </div>

    <div id="channel-list">
      {% include "partials/channel_list.html" %}
    </div>
  </form>

  <div id="bulk-action-bar" class="bulk-action-bar hidden">
    <span id="selection-count">0 selected</span>
    <div class="bulk-actions">
      <div class="bulk-assign-wrapper">
        <button type="button" class="outline" onclick="toggleBulkPicker('assign')">Add to category</button>
        <div id="bulk-assign-picker" class="bulk-picker hidden"></div>
      </div>
      <div class="bulk-assign-wrapper">
        <button type="button" class="outline secondary" onclick="toggleBulkPicker('unassign')">Remove from category</button>
        <div id="bulk-unassign-picker" class="bulk-picker hidden"></div>
      </div>
    </div>
  </div>
</div>

<select id="toolbar-category-select" name="category_id" style="display:none">
  <option value="">— category —</option>
  {% for cat in categories %}
  <option value="{{ cat.id }}">{{ cat.name }}</option>
  {% endfor %}
</select>

<div id="tab-categories" class="tab-panel{% if active_tab != 'categories' %} hidden{% endif %}" role="tabpanel">
  <form hx-post="/categories" hx-target="#category-list" hx-swap="innerHTML" class="toolbar"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="text" name="name" placeholder="New category name" required>
    <button type="submit">Create</button>
  </form>

  <div id="category-list">
    {% include "partials/category_list.html" %}
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  event.target.classList.add('active');
  history.replaceState(null, '', '/channels?tab=' + tab);

  if (tab === 'channels') {
    htmx.ajax('GET', '/channels', {target: '#channel-list', swap: 'innerHTML'});
  }
}

function filterChannels(query) {
  var q = query.toLowerCase();
  document.querySelectorAll('.channel-row').forEach(function(row) {
    var title = row.getAttribute('data-title') || '';
    var topics = row.querySelector('.topics');
    var topicText = topics ? topics.textContent.toLowerCase() : '';
    row.style.display = (title.includes(q) || topicText.includes(q)) ? '' : 'none';
  });
}

function toggleBulkPicker(type) {
  var picker = document.getElementById('bulk-' + type + '-picker');
  var other = document.getElementById('bulk-' + (type === 'assign' ? 'unassign' : 'assign') + '-picker');
  other.classList.add('hidden');

  // Populate picker from the OOB-updated category select
  var cats = document.getElementById('toolbar-category-select');
  picker.innerHTML = '';
  Array.from(cats.options).forEach(function(opt) {
    if (!opt.value) return;
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'outline small-btn' + (type === 'unassign' ? ' secondary' : '');
    btn.textContent = opt.textContent;
    btn.onclick = function() { bulkAction(type, opt.value); };
    picker.appendChild(btn);
  });

  picker.classList.toggle('hidden');
}

function bulkAction(type, categoryId) {
  var url = type === 'assign' ? '/channels/assign' : '/channels/unassign';
  var checked = document.querySelectorAll('#channel-form input[name=channel_ids]:checked');
  if (!checked.length) return;

  var formData = new FormData();
  formData.append('category_id', categoryId);
  checked.forEach(function(cb) { formData.append('channel_ids', cb.value); });

  fetch(url, {method: 'POST', body: formData, headers: {'HX-Request': 'true'}})
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('channel-list').innerHTML = html;
      htmx.process(document.getElementById('channel-list'));
      closeBulkPickers();
      updateSelection();
      reapplySearch();
    });
}

function closeBulkPickers() {
  document.querySelectorAll('.bulk-picker').forEach(function(p) { p.classList.add('hidden'); });
}

function postChannelUpdate(url, params) {
  var formData = new FormData();
  for (var key in params) { formData.append(key, params[key]); }
  fetch(url, {method: 'POST', body: formData, headers: {'HX-Request': 'true'}})
    .then(function(r) { return r.text(); })
    .then(function(html) {
      document.getElementById('channel-list').innerHTML = html;
      htmx.process(document.getElementById('channel-list'));
      reapplySearch();
    });
}

function reapplySearch() {
  var search = document.getElementById('channel-search');
  if (search && search.value) filterChannels(search.value);
}

// Re-apply search filter after any HTMX swap of the channel list
document.body.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target.id === 'channel-list') reapplySearch();
});

function toggleAll(source) {
  var table = source.closest('table');
  table.querySelectorAll('input[name="channel_ids"]').forEach(function(cb) {
    cb.checked = source.checked;
  });
  updateSelection();
}

function updateSelection() {
  var checked = document.querySelectorAll('#channel-list input[name="channel_ids"]:checked');
  var bar = document.getElementById('bulk-action-bar');
  var counter = document.getElementById('selection-count');

  if (bar) {
    if (checked.length > 0) {
      bar.classList.remove('hidden');
      counter.textContent = checked.length + ' selected';
    } else {
      bar.classList.add('hidden');
      closeBulkPickers();
    }
  }

  document.querySelectorAll('#channel-list .channel-row').forEach(function(row) {
    var cb = row.querySelector('input[name="channel_ids"]');
    row.classList.toggle('selected', cb && cb.checked);
  });
}
</script>
{% endblock %}
