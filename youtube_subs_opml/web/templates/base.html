<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YouTube Subs OPML{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored) {
        document.documentElement.setAttribute('data-theme', stored);
      } else if (matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <nav class="container">
    <ul>
      <li><a href="/channels"><strong>YouTube Subs OPML</strong></a></li>
    </ul>
    <ul>
      {% if user %}
        <li><a href="/channels">Channels</a></li>
        <li><a href="/settings">Settings</a></li>
        <li class="nav-username">{{ user.display_name or user.email }}</li>
        <li><a href="/auth/logout">Log out</a></li>
      {% else %}
        <li><a href="/auth/login">Log in</a></li>
      {% endif %}
      <li>
        <a href="#" class="theme-toggle" onclick="toggleTheme(); return false;" title="Toggle dark mode">
          <span class="theme-icon-light">&#9790;</span>
          <span class="theme-icon-dark">&#9788;</span>
        </a>
      </li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
  </script>
</body>
</html>
