<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YouTube Subs OPML{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <nav class="container">
    <ul>
      <li><a href="/channels"><strong>YouTube Subs OPML</strong></a></li>
    </ul>
    <ul>
      {% if user %}
        <li><a href="/channels">Channels</a></li>
        <li><a href="/settings">Settings</a></li>
        <li>{{ user.display_name or user.email }}</li>
        <li><a href="/auth/logout">Log out</a></li>
      {% else %}
        <li><a href="/auth/login">Log in</a></li>
      {% endif %}
      <li>
        <a href="#" class="theme-toggle" onclick="toggleTheme(); return false;" title="Toggle dark mode">
          <span class="theme-icon-light">&#9790;</span>
          <span class="theme-icon-dark">&#9788;</span>
        </a>
      </li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
  </script>
</body>
</html>
